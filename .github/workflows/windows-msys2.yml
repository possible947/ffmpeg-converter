name: Build Windows (MSYS2)

on:
  push:
    tags:
      - 'windows'
  workflow_dispatch: {}

jobs:
  build-msys2:
    name: Build windows_cli using MSYS2 (MINGW64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          tags: true

      - name: Setup MSYS2 and install packages
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-jansson

      - name: Configure (MINGW64)
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" -DCMAKE_PREFIX_PATH=/mingw64 ..

      - name: Build windows_cli
        shell: msys2 {0}
        run: |
          cd build
          cmake --build . --target windows_cli --config Release

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg_converter-windows
          path: |
            build/**/ffmpeg_converter*.exe

      - name: Generate changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -e
          git fetch --tags
          REF=${GITHUB_REF#refs/tags/}
          # Try to find previous tag; if none, take last 50 commits
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..${GITHUB_REF} --pretty=format:'- %s (%h)' > changelog.txt || true
          else
            git log -n 50 --pretty=format:'- %s (%h)' > changelog.txt || true
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            build/**/ffmpeg_converter*.exe
