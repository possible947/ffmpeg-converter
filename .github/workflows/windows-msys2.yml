name: Build Windows (MSYS2)

on:
  push:
    tags:
      - 'windows'
  workflow_dispatch: {}

jobs:
  build-msys2:
    name: Build windows_cli using MSYS2 (MINGW64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 and install packages
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-jansson

      - name: Configure (MINGW64)
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" -DCMAKE_PREFIX_PATH=/mingw64 ..

      - name: Build windows_cli
        shell: msys2 {0}
        run: |
          cd build
          cmake --build . --target windows_cli --config Release

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg_converter-windows
          path: |
            build/**/ffmpeg_converter*.exe

      - name: Create GitHub Release and upload asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            build/**/ffmpeg_converter*.exe
